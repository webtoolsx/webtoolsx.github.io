<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multiple Circular Meters</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      padding: 40px;
    }
    .circle-meter {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 8px solid #333;
    }
    .knob {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #0ff;
      border-radius: 50%;
      cursor: pointer;
      left: 50%;
      top: 0;
      transform: translate(-50%, -50%);
    }
    .value {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
    }
  </style>
</head>
<body>

  <!-- Add as many meters as you want -->
  <div id="meter1" class="circle-meter">
    <div class="value"></div>
    <div class="knob"></div>
  </div>

  <div id="meter2" class="circle-meter">
    <div class="value"></div>
    <div class="knob"></div>
  </div>

  <div id="meter3" class="circle-meter">
    <div class="value"></div>
    <div class="knob"></div>
  </div>

  <script>
    // Helper to format minutes to 12-hour time with AM/PM
    function formatTime(minutes) {
      let h = Math.floor(minutes / 60);
      let m = minutes % 60;
      let ampm = h < 12 ? 'AM' : 'PM';
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    function createCircularMeter(containerId, initialMinutes = 0) {
      const meter = document.getElementById(containerId);
      const knob = meter.querySelector('.knob');
      const display = meter.querySelector('.value');

      const getCenter = () => {
        const rect = meter.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2,
        };
      };

      // There are 288 steps (24*60/5) in a full circle
      const steps = 288;
      const stepAngle = 360 / steps;

      const updateKnob = (step) => {
        const angle = step * stepAngle;
        const radius = 154;
        const rad = angle * Math.PI / 180;
        const x = 150 + radius * Math.cos(rad);
        const y = 150 + radius * Math.sin(rad);
        knob.style.left = `${x}px`;
        knob.style.top = `${y}px`;

        const minutes = step * 5;
        display.textContent = formatTime(minutes);
      };

      const getAngle = (x, y) => {
        const center = getCenter();
        const dx = x - center.x;
        const dy = y - center.y;
        let angle = Math.atan2(dy, dx) * (180 / Math.PI);
        return angle < 0 ? 360 + angle : angle;
      };

      let isDragging = false;
      let currentStep = Math.round(initialMinutes / 5) % steps;

      const handleMove = (e) => {
        if (!isDragging) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const angle = getAngle(x, y);
        let step = Math.round(angle / stepAngle) % steps;
        currentStep = step;
        updateKnob(currentStep);
      };

      knob.addEventListener('mousedown', () => isDragging = true);
      document.addEventListener('mouseup', () => isDragging = false);
      document.addEventListener('mousemove', handleMove);

      knob.addEventListener('touchstart', () => isDragging = true);
      document.addEventListener('touchend', () => isDragging = false);
      document.addEventListener('touchmove', handleMove);

      updateKnob(currentStep);
    }

    // Initialize all meters (set initial time in minutes)
    createCircularMeter('meter1', 0);    // 12:00 AM
    createCircularMeter('meter2', 720);  // 12:00 PM
    createCircularMeter('meter3', 360);  // 6:00 AM
  </script>
</body>
</html>
