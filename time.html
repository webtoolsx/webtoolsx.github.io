  <script>
    // List of time zones to display
    // List of all IANA time zones (sample, not exhaustive)
    const timezones = [
      { label: "UTC", tz: "UTC" },
      { label: "GMT", tz: "Europe/London" },
      { label: "EST", tz: "America/New_York" },
      { label: "EDT", tz: "America/New_York" },
      { label: "CST", tz: "America/Chicago" },
      { label: "CDT", tz: "America/Chicago" },
      { label: "MST", tz: "America/Denver" },
      { label: "MDT", tz: "America/Denver" },
      { label: "PST", tz: "America/Los_Angeles" },
      { label: "PDT", tz: "America/Los_Angeles" },
      { label: "AKST", tz: "America/Anchorage" },
      { label: "AKDT", tz: "America/Anchorage" },
      { label: "HST", tz: "Pacific/Honolulu" },
      { label: "IST", tz: "Asia/Kolkata" },
      { label: "CET", tz: "Europe/Paris" },
      { label: "CEST", tz: "Europe/Paris" },
      { label: "EET", tz: "Europe/Athens" },
      { label: "EEST", tz: "Europe/Athens" },
      { label: "MSK", tz: "Europe/Moscow" }, 
      { label: "JST", tz: "Asia/Tokyo" },
      { label: "KST", tz: "Asia/Seoul" },
      { label: "CST (China)", tz: "Asia/Shanghai" },
      { label: "AWST", tz: "Australia/Perth" },
      { label: "ACST", tz: "Australia/Adelaide" },
      { label: "AEST", tz: "Australia/Sydney" },
      { label: "NZST", tz: "Pacific/Auckland" },
      { label: "NZDT", tz: "Pacific/Auckland" },
      { label: "SAST", tz: "Africa/Johannesburg" },
      { label: "WAT", tz: "Africa/Lagos" },
      { label: "CAT", tz: "Africa/Harare" },
      { label: "EAT", tz: "Africa/Nairobi" },
      { label: "ART", tz: "America/Argentina/Buenos_Aires" },
      { label: "BRT", tz: "America/Sao_Paulo" },
      { label: "CLT", tz: "America/Santiago" },
      { label: "AST", tz: "Asia/Riyadh" },
      { label: "GST", tz: "Asia/Dubai" },
      { label: "PKT", tz: "Asia/Karachi" },
      { label: "WIB", tz: "Asia/Jakarta" },
      { label: "SGT", tz: "Asia/Singapore" },
      { label: "HKT", tz: "Asia/Hong_Kong" },
      { label: "MYT", tz: "Asia/Kuala_Lumpur" },
      { label: "PHT", tz: "Asia/Manila" },
      { label: "ICT", tz: "Asia/Bangkok" },
      { label: "MAGT", tz: "Asia/Magadan" },
      { label: "CHST", tz: "Pacific/Guam" },
      { label: "FJT", tz: "Pacific/Fiji" },
      { label: "TOT", tz: "Pacific/Tongatapu" }
    ];

    // Dynamically inject timezone checkboxes
    const tzCheckboxContainer = document.querySelector('.timezone-checkboxes');
    if (tzCheckboxContainer) {
      timezones.forEach(tz => {
      // Default checked for UTC and IST
      const checked = (tz.label === "UTC" || tz.label === "IST") ? "checked" : "";
      tzCheckboxContainer.insertAdjacentHTML(
        'beforeend',
        `<label><input type="checkbox" class="tz-toggle" value="${tz.label}" ${checked}> ${tz.label}</label> `
      );
      });
    }

    let hourFormat = "24";
    document.querySelectorAll('input[name="hourFormat"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
      hourFormat = this.value;
      updateTimezones();
    });
    });

    function getOffsetSign(offsetMinutes) {
    if (offsetMinutes === 0) return '<span style="color:gray;">±0</span>';
    if (offsetMinutes > 0) return `<span style="color:green;">+${offsetMinutes / 60}</span>`;
    return `<span style="color:red;">${offsetMinutes / 60}</span>`;
    }

    function updateTimezones() {
    const now = new Date();
    timezones.forEach(zone => {
      var container = document.getElementById(zone.label);
      if (!container) return;

      const localeOpts = { timeZone: zone.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: hourFormat === "12" };
      const dateOpts = { timeZone: zone.tz, month: 'short', day: 'numeric', year: 'numeric' };
      const weekdayOpts = { timeZone: zone.tz, weekday: 'short' };

      let timeStr = now.toLocaleTimeString([], localeOpts); // "13:05:09" or "01:05:09 PM"
      let hour, minute, second, ampm = "";
      if (hourFormat === "12") {
      // e.g. "01:05:09 PM"
      const match = timeStr.match(/^(\d{2}):(\d{2}):(\d{2})\s*(AM|PM)?$/i);
      if (match) {
        hour = match[1];
        minute = match[2];
        second = match[3];
        ampm = match[4] ? ` ${match[4]}` : "";
      } else {
        [hour, minute, second] = timeStr.split(':');
      }
      } else {
      [hour, minute, second] = timeStr.split(':');
      }

      const dateStr = now.toLocaleDateString([], dateOpts);
      const weekdayStr = now.toLocaleDateString([], weekdayOpts);

      // Calculate offset in hours from UTC
      const utc = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
      const local = new Date(now.toLocaleString('en-US', { timeZone: zone.tz }));
      const offsetMinutes = Math.round((local - utc) / 60000);

      const offsetHtml = getOffsetSign(offsetMinutes);

      // Only update the relevant fields
      const monthDiv = container.querySelector('.month');
      const offsetDiv = container.querySelector('.offset');
      const dayDiv = container.querySelector('.day');
      const hourSpan = container.querySelector('.hour');
      const minuteSpan = container.querySelector('.minute');
      const secondSpan = container.querySelector('.second');
      const timeDiv = container.querySelector('.time');
      const weekdayDiv = container.querySelector('.weekday');

      if (monthDiv) monthDiv.childNodes[0].nodeValue = zone.label + " ";
      if (offsetDiv) offsetDiv.innerHTML = offsetHtml;
      if (hourSpan) hourSpan.textContent = hour;
      if (minuteSpan) minuteSpan.textContent = ':' + minute;
      if (secondSpan) secondSpan.textContent = second + (hourFormat === "12" ? ampm : "");
      if (timeDiv) timeDiv.textContent = dateStr;
      if (weekdayDiv) weekdayDiv.textContent = weekdayStr;
    });
    }

    updateTimezones();
    setInterval(updateTimezones, 1000);
  </script>

    <script>
      // Helper to get the label and tz object by label or fallback
      function getZoneByLabel(label) {
        return timezones.find(z => z.label === label) || { label: label, tz: label };
      }

      // Generate the HTML for a calendar block
      function getCalendarHtml(label) {
        const zone = getZoneByLabel(label);
        return `
          <div class="calendar position-relative" id="${zone.label}">
            <div class="month">${zone.label} <div class="offset">±0</div>
            <div class="offset2">
              <button class="close-calendar-btn" data-tz="${zone.label}" style="position:absolute;top:8px;left:8px;background:transparent;border:none;font-size:1.5rem;color:#fff799;cursor:pointer;z-index:10;" title="Remove">&times;</button>
            </div>
            </div>
            <div class="day">
              <span class="hour" style="font-size:3rem;">00</span>
              <span class="minute" style="font-size:3rem;">:00</span>
              <span class="second" style="font-size:1rem;">00</span>
            </div>
            <div class="time">--</div>
            <div class="weekday">---</div>
          </div>
        `;
      }

      // Search bar logic
      const tzSearchInput = document.getElementById('tz-search');
    const tzSearchResults = document.getElementById('tz-search-results');
      const calendarContainer = document.getElementById('gradientBanner');

      // Show calendars from localStorage on first load
      (function showSavedTimezones() {
        let saved = [];
        try {
          saved = JSON.parse(localStorage.getItem('selectedTimezones') || '[]');
        } catch (e) { saved = []; }
        if (Array.isArray(saved)) {
          saved.forEach(label => {
        if (!document.getElementById(label)) {
          calendarContainer.insertAdjacentHTML('beforeend', getCalendarHtml(label));
        }
          });
        }
      })();

      function renderSearchResults(query) {
        tzSearchResults.style.display = 'block';
        tzSearchResults.innerHTML = '';
        if (!query) return;
        const q = query.trim().toLowerCase();
        const matches = timezones.filter(z => z.label.toLowerCase().includes(q) || z.tz.toLowerCase().includes(q));
        matches.forEach(z => {
          const item = document.createElement('button');
          item.type = 'button';
          item.className = 'list-group-item list-group-item-action';
          item.textContent = `${z.label} (${z.tz})`;
          item.onclick = function() {
        // Show calendar for this zone
        if (!document.getElementById(z.label)) {
          calendarContainer.insertAdjacentHTML('beforeend', getCalendarHtml(z.label));
          this.style.backgroundColor = '#d1e7dd'; // Highlight selected
          tzSearchResults.style.display = 'none';
          updateTimezones();
        }
        // Save selected labels as array in localStorage
        let saved = JSON.parse(localStorage.getItem('selectedTimezones') || '[]');
        if (!saved.includes(z.label)) {
          saved.push(z.label);
          localStorage.setItem('selectedTimezones', JSON.stringify(saved));
        }
        // Optionally scroll to it
        const cal = document.getElementById(z.label);
        if (cal) cal.scrollIntoView({ behavior: 'smooth', block: 'center' });
          };
          tzSearchResults.appendChild(item);
        });
      }

      if (tzSearchInput) {
        tzSearchInput.addEventListener('input', function() {
          renderSearchResults(this.value);
        });
        tzSearchInput.addEventListener('focus', function() {
          renderSearchResults(this.value);
        });
      }

      // Show/hide time zone blocks based on checkbox
      document.querySelectorAll('.tz-toggle').forEach(function(cb) {
        cb.addEventListener('change', function() {
          var tz = this.value;
          var container = document.getElementById('gradientBanner');
          var cal = document.getElementById(tz);
          if (this.checked) {
            // Inject if not already present
            if (!cal) {
              container.insertAdjacentHTML('beforeend', getCalendarHtml(tz));
            } else {
              cal.style.display = '';
            }
          } else {
            if (cal) cal.remove();
          }
        });
      });

      // On page load, inject checked calendars
      document.querySelectorAll('.tz-toggle').forEach(function(cb) {
        var tz = cb.value;
        var container = document.getElementById('gradientBanner');
        var cal = document.getElementById(tz);
        if (cb.checked && !cal) {
          container.insertAdjacentHTML('beforeend', getCalendarHtml(tz));
        }
      });

      // Delegate close button click for calendars
      calendarContainer.addEventListener('click', function(e) {
        if (e.target.classList.contains('close-calendar-btn')) {
          const tz = e.target.getAttribute('data-tz');
          const cal = document.getElementById(tz);
          if (cal) cal.remove();
          // Remove from localStorage
          let saved = JSON.parse(localStorage.getItem('selectedTimezones') || '[]');
          saved = saved.filter(label => label !== tz);
          localStorage.setItem('selectedTimezones', JSON.stringify(saved));
        }
      });
    </script>
